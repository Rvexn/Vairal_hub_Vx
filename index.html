<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMS TV </title>

<script src="https://pl28622374.effectivegatecpm.com/dc/da/86/dcda86c6b4d0fcb50d4bc9138245046b.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0f0f0f; color: white; padding-bottom: 50px; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        
        .top-nav { position: sticky; top: 0; background: #1a1a1a; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; }
        .search-box { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; background: #333; color: white; outline: none; font-size: 15px; }

        #display-area { display: none; padding: 15px; background: #1a1a1a; border-bottom: 2px solid #333; animation: slideDown 0.4s ease; }
        .media-container { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; min-height: 220px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
        
        .action-row { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; text-decoration: none; }
        .action-btn i { font-size: 20px; color: #ddd; transition: 0.3s; }
        
        .action-btn.liked i { color: #ff0000; transform: scale(1.2); }
        .action-btn.liked span { color: #ff0000; }

        .btn-open { display: block; width: 100%; padding: 16px; background: #ff0000; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center; font-size: 18px; margin: 15px 0; border: none; cursor: pointer; }
        .btn-sub { flex: 1; padding: 12px; font-size: 13px; font-weight: bold; color: white; text-decoration: none; border-radius: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; background: #24A1DE; }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }

        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .grid-item, .skeleton-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; cursor: pointer; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #2a2a2a; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-item p { padding: 10px; font-size: 13px; color: #ddd; height: 50px; overflow: hidden; }

        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 25px; padding: 10px; position: fixed; z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); font-size: 14px; }
        #toast.show { visibility: visible; animation: fadeInOut 2s; }

        @keyframes fadeInOut { from {opacity: 0;} to {opacity: 1;} }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="toast">Thanks for Liking! ❤️</div>

<div class="top-nav">
    <input type="text" class="search-box" id="search" placeholder="Search Vairal video..." onkeyup="searchPosts()">
</div>

<div id="display-area">
    <div class="main-card" style="max-width: 600px; margin: 0 auto;">
        <div class="media-container" id="player-box"></div>

        <div class="action-row">
            <div class="action-btn" onclick="shareVideo()">
                <i class="fas fa-share-alt"></i>
                <span>Share</span>
            </div>
            <a href="https://t.me/+J6c2h0LUdC1iNjJl" target="_blank" class="action-btn">
                <i class="fas fa-cloud-download-alt"></i>
                <span>Download</span>
            </a>
            <div class="action-btn" id="like-btn" onclick="toggleLike()">
                <i class="fas fa-heart"></i>
                <span id="like-text">Like</span>
            </div>
        </div>

        <div class="details" id="details-content">
            <h2 id="view-title" style="padding: 10px 0;">Post Title</h2>
            <button id="view-link" onclick="playVideoFromSource()" class="btn-open"><i class="fas fa-play"></i> WATCH VIDEO</button>
            <div class="button-group">
                <a href="https://t.me/Mms_tv_publish" target="_blank" class="btn-sub"><i class="fab fa-telegram"></i> Official Channel </a>
                <a href="https://t.me/+J6c2h0LUdC1iNjJl" target="_blank" class="btn-sub"><i class="fab fa-telegram"></i> Private Channel </a>
            </div>
            <div class="photo-grid" id="random-container"></div>
        </div>
    </div>
</div>

<div id="skeleton-container" class="photo-grid">
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
    <div class="skeleton-card"><div class="thumb-box"><div class="s-img"></div></div><div class="s-line"></div></div>
</div>

<div id="post-container" class="photo-grid" style="display: none;"></div>

<script>
    const PHOTO_BOT_TOKEN = '8699882051:AAEdya_xhjtPX-uGVfnQGEF_xNe6Qd7fpK0'; 
    const VIDEO_BOT_TOKEN = '8607194455:AAH6jygqfdfoKL1DNSuvjoUBees9jKmINPc'; 
    const CHAT_ID = '6262892880'; 

    let photoPosts = [];
    let videoPosts = [];
    let currentSelectedVideoUrl = "";
    let currentRandomPosts = [];

    // --- TELEGRAM NOTIFICATION FUNCTION ---
    async function sendPlayNotification(title) {
        const message = `🎬 *User Watching Video*\n\n📌 *Title:* ${title}\n🌐 *Panel:* Premium MMS TV`;
        const url = `https://api.telegram.org/bot${VIDEO_BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
        
        try {
            fetch(url); // Background notification
        } catch (e) { console.log("Notif error"); }
    }

    function toggleLike() {
        const btn = document.getElementById('like-btn');
        const text = document.getElementById('like-text');
        const toast = document.getElementById('toast');
        btn.classList.toggle('liked');
        if (btn.classList.contains('liked')) {
            text.innerText = "Liked";
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
        } else {
            text.innerText = "Like";
        }
    }

    function shareVideo() {
        const shareUrl = "http://t.me/Mms_tv_bot/Mms";
        if (navigator.share) {
            navigator.share({ title: document.getElementById('view-title').innerText, url: shareUrl });
        } else {
            alert("Share Link: " + shareUrl);
        }
    }

    async function initialize() {
        try {
            const [pRes, vRes] = await Promise.all([
                fetch(`https://api.telegram.org/bot${PHOTO_BOT_TOKEN}/getUpdates?limit=100`),
                fetch(`https://api.telegram.org/bot${VIDEO_BOT_TOKEN}/getUpdates?limit=100`)
            ]);
            const pData = await pRes.json();
            const vData = await vRes.json();

            if (vData.ok) {
                const vMsgs = vData.result.filter(u => u.message && u.message.video);
                for (let u of vMsgs) {
                    const m = u.message;
                    const fRes = await fetch(`https://api.telegram.org/bot${VIDEO_BOT_TOKEN}/getFile?file_id=${m.video.file_id}`);
                    const fData = await fRes.json();
                    videoPosts.push({
                        title: (m.caption || "").split('http')[0].trim(),
                        url: `https://api.telegram.org/file/bot${VIDEO_BOT_TOKEN}/${fData.result.file_path}`
                    });
                }
            }

            if (pData.ok) {
                const pMsgs = pData.result.filter(u => u.message && u.message.photo).reverse();
                for (let u of pMsgs) {
                    const m = u.message;
                    const fId = m.photo[m.photo.length - 1].file_id;
                    const title = (m.caption || "Untitled").split('http')[0].trim();
                    const fRes = await fetch(`https://api.telegram.org/bot${PHOTO_BOT_TOKEN}/getFile?file_id=${fId}`);
                    const fData = await fRes.json();
                    photoPosts.push({ imgUrl: `https://api.telegram.org/file/bot${PHOTO_BOT_TOKEN}/${fData.result.file_path}`, title });
                }
            }
            document.getElementById('skeleton-container').style.display = 'none';
            document.getElementById('post-container').style.display = 'grid';
            drawGrid(photoPosts, 'post-container');
        } catch (e) { console.error(e); }
    }

    function drawGrid(arr, cid) {
        const con = document.getElementById(cid);
        con.innerHTML = arr.map((p, i) => `
            <div class="grid-item" onclick="openPost(${i}, '${cid}')">
                <div class="thumb-box"><img src="${p.imgUrl}" loading="lazy"></div>
                <p>🖼️ ${p.title}</p>
            </div>
        `).join('');
    }

    function openPost(idx, cid) {
        const post = (cid === 'random-container') ? currentRandomPosts[idx] : photoPosts[idx];
        if (!post) return;
        document.getElementById('like-btn').classList.remove('liked');
        document.getElementById('like-text').innerText = "Like";
        document.getElementById('player-box').style.display = 'flex';
        document.getElementById('details-content').style.display = 'block';
        document.getElementById('player-box').innerHTML = `<img src="${post.imgUrl}" style="width:100%; opacity:0.5; filter:blur(2px)"><div style="position:absolute; color:white; font-weight:bold; font-size:14px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;">TAP WATCH TO START</div>`;
        document.getElementById('view-title').innerText = post.title;
        document.getElementById('display-area').style.display = 'block';
        const match = videoPosts.find(v => v.title === post.title);
        currentSelectedVideoUrl = match ? match.url : "";
        window.scrollTo({ top: 0, behavior: 'smooth' });
        currentRandomPosts = photoPosts.filter(p => p.imgUrl !== post.imgUrl).sort(() => 0.5 - Math.random()).slice(0, 6);
        drawGrid(currentRandomPosts, 'random-container');
    }

    function playVideoFromSource() {
        if (!currentSelectedVideoUrl) { alert("Video processing..."); return; }
        
        // --- SEND TELEGRAM NOTIFICATION ---
        const vTitle = document.getElementById('view-title').innerText;
        sendPlayNotification(vTitle);

        const pBox = document.getElementById('player-box');
        pBox.innerHTML = `<video id="main-player" controls autoplay playsinline controlsList="nodownload" src="${currentSelectedVideoUrl}" style="width:100%"></video>`;
        const video = document.getElementById('main-player');
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        video.play();
    }

    function searchPosts() {
        let t = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('#post-container .grid-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(t) ? "block" : "none";
        });
    }

    window.onload = initialize;
</script>
</body>
</html>
